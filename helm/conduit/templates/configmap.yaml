apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "conduit.fullname" . }}
  namespace: {{ include "conduit.namespace" . }}
  labels:
    {{- include "conduit.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  HOST: {{ .Values.config.host | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  FLASK_ENV: {{ .Values.config.flaskEnv | quote }}
