# Development environment overrides
# Usage: helm upgrade --install conduit ./helm/conduit -f helm/conduit/values-dev.yaml

image:
  tag: "latest"
  pullPolicy: Always

replicaCount: 1

config:
  logLevel: DEBUG
  flaskEnv: development

hpa:
  enabled: false

ingress:
  host: conduit.dev.example.com
  tls:
    enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi
