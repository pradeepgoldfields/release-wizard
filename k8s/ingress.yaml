apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: release-wizard
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: release-wizard.example.com   # update to your domain
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: release-wizard
            port:
              number: 80
