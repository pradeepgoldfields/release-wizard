<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g5a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0284c7"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="g5b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0284c7" stop-opacity="0.2"/>
      <stop offset="100%" style="stop-color:#4f46e5" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Concept 5: Tunnel / cross-section view — looking into the pipe end-on -->
  <!-- Outer ring -->
  <circle cx="30" cy="30" r="26" fill="none" stroke="url(#g5a)" stroke-width="2"/>
  <!-- Middle ring -->
  <circle cx="30" cy="30" r="18" fill="none" stroke="url(#g5a)" stroke-width="1.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="30" cy="30" r="10" fill="none" stroke="url(#g5a)" stroke-width="1.5" opacity="0.4"/>
  <!-- Core -->
  <circle cx="30" cy="30" r="4"  fill="url(#g5a)"/>
  <circle cx="30" cy="30" r="1.8" fill="white" opacity="0.9"/>
  <!-- Four flow spokes — things entering the tunnel -->
  <line x1="30" y1="4"  x2="30" y2="20" stroke="url(#g5a)" stroke-width="1.5" opacity="0.5"/>
  <line x1="56" y1="30" x2="40" y2="30" stroke="url(#g5a)" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="56" x2="30" y2="40" stroke="url(#g5a)" stroke-width="1.5" opacity="0.5"/>
  <line x1="4"  y1="30" x2="20" y2="30" stroke="url(#g5a)" stroke-width="1.5" opacity="0.5"/>

  <!-- Wordmark -->
  <text x="68" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
