<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g8a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="g8b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Concept 8: Shield / gate with a flow beam cutting through -->
  <!-- Shield body -->
  <path d="M30,4 L52,14 L52,34 C52,46 30,56 30,56 C30,56 8,46 8,34 L8,14 Z"
        fill="url(#g8a)" stroke="#334155" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Horizontal beam cutting through the shield -->
  <rect x="4" y="26" width="56" height="8" rx="4" fill="url(#g8b)" opacity="0.9"/>
  <!-- Shield border accent -->
  <path d="M30,4 L52,14 L52,34 C52,46 30,56 30,56 C30,56 8,46 8,34 L8,14 Z"
        fill="none" stroke="url(#g8b)" stroke-width="1.5" stroke-linejoin="round" opacity="0.4"/>
  <!-- Entry and exit dots on the beam -->
  <circle cx="8"  cy="30" r="3" fill="#38bdf8"/>
  <circle cx="52" cy="30" r="3" fill="#a78bfa"/>

  <!-- Wordmark -->
  <text x="70" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
