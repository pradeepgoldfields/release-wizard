<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g6a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="g6b" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Concept 6: Braided / interleaved streams merging into one -->
  <!-- Three input lines converging from left -->
  <path d="M2,14 C12,14 14,30 24,30" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M2,30 C8,30  16,30 24,30" fill="none" stroke="#0284c7" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M2,46 C12,46 14,30 24,30" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Central merge point -->
  <circle cx="24" cy="30" r="5" fill="#0f172a" stroke="url(#g6a)" stroke-width="2"/>
  <circle cx="24" cy="30" r="2" fill="url(#g6a)"/>

  <!-- Single unified output -->
  <path d="M29,30 C36,30 44,30 56,30" fill="none" stroke="url(#g6a)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Arrow tip -->
  <path d="M52,26 L57,30 L52,34" fill="none" stroke="url(#g6a)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Input dots -->
  <circle cx="4"  cy="14" r="2.5" fill="#10b981"/>
  <circle cx="4"  cy="30" r="2.5" fill="#0284c7"/>
  <circle cx="4"  cy="46" r="2.5" fill="#f59e0b"/>

  <!-- Wordmark -->
  <text x="72" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
