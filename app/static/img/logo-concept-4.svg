<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g4a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Concept 4: Infinity / continuous loop — releases keep flowing forever -->
  <!-- Left loop -->
  <path d="M14,30 C14,18 6,12 2,18 C-2,24 6,36 14,30 Z"
        fill="none" stroke="url(#g4a)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centre crossover -->
  <path d="M14,30 C22,24 30,36 38,30" fill="none" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M14,30 C22,36 30,24 38,30" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right loop -->
  <path d="M38,30 C38,18 46,12 50,18 C54,24 46,36 38,30 Z"
        fill="none" stroke="url(#g4a)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="26" cy="30" r="3.5" fill="url(#g4a)"/>
  <circle cx="26" cy="30" r="1.5" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="64" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
