<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g9a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="g9b" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c026d3"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Concept 9: Waveform / signal — the pulse that passes through -->
  <!-- Flat line before -->
  <line x1="2" y1="30" x2="10" y2="30" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Wave pulse (the "conduit" signal) -->
  <path d="M10,30 L16,30 L18,14 L22,46 L26,14 L30,46 L34,22 L36,30 L50,30"
        fill="none" stroke="url(#g9b)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flat line after -->
  <line x1="50" y1="30" x2="58" y2="30" stroke="#4f46e5" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Moving dot on the wave crest -->
  <circle cx="26" cy="14" r="3.5" fill="url(#g9a)"/>
  <circle cx="26" cy="14" r="1.5" fill="white" opacity="0.9"/>

  <!-- Wordmark -->
  <text x="70" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
