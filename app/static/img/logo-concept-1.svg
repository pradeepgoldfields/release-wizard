<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="pipe-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#38bdf8"/>
    </linearGradient>
    <linearGradient id="core-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <marker id="arr-r" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#38bdf8" opacity="0.7"/>
    </marker>
    <marker id="arr-r2" markerWidth="5" markerHeight="5" refX="4" refY="2.5" orient="auto">
      <path d="M0,0 L5,2.5 L0,5 Z" fill="#818cf8" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Left incoming flows (3 streams converging) -->
  <line x1="2"  y1="14" x2="20" y2="26" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.7" marker-end="url(#arr-r)"/>
  <line x1="2"  y1="30" x2="20" y2="30" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round" opacity="0.9" marker-end="url(#arr-r)"/>
  <line x1="2"  y1="46" x2="20" y2="34" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" opacity="0.7" marker-end="url(#arr-r)"/>

  <!-- Central conduit body — the "through" element -->
  <rect x="20" y="20" width="24" height="20" rx="10" fill="url(#core-grad)" opacity="0.15"/>
  <rect x="20" y="20" width="24" height="20" rx="10" fill="none" stroke="url(#pipe-grad)" stroke-width="2.5"/>
  <!-- Flow dot moving through -->
  <circle cx="32" cy="30" r="5" fill="url(#core-grad)"/>
  <circle cx="32" cy="30" r="2.5" fill="white" opacity="0.8"/>

  <!-- Right outgoing flows (3 streams diverging) -->
  <line x1="44" y1="26" x2="62" y2="14" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.7" marker-end="url(#arr-r2)"/>
  <line x1="44" y1="30" x2="62" y2="30" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.9" marker-end="url(#arr-r2)"/>
  <line x1="44" y1="34" x2="62" y2="46" stroke="#818cf8" stroke-width="2" stroke-linecap="round" opacity="0.7" marker-end="url(#arr-r2)"/>

  <!-- Wordmark -->
  <text x="74" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
