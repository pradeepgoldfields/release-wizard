<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" width="240" height="60">
  <defs>
    <linearGradient id="g7a" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Concept 7: The Letter C as a pipe opening — minimal, modern -->
  <!-- Thick C shape — cross-section of a pipe end -->
  <path d="M48,10 A24,24 0 1,0 48,50"
        fill="none" stroke="url(#g7a)" stroke-width="10" stroke-linecap="round"/>
  <!-- Inner cutout to make it look hollow (pipe wall) -->
  <path d="M44,17 A17,17 0 1,0 44,43"
        fill="none" stroke="#f8fafc" stroke-width="5" stroke-linecap="round"/>
  <!-- Flow arrow coming out of the opening -->
  <line x1="50" y1="30" x2="60" y2="30" stroke="url(#g7a)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M57,26 L62,30 L57,34" fill="none" stroke="url(#g7a)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Wordmark (shifted right to clear the C mark) -->
  <text x="74" y="37" font-family="'Segoe UI', system-ui, sans-serif" font-weight="700" font-size="26"
        fill="#1e293b" letter-spacing="-0.5">conduit</text>
</svg>
